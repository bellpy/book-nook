{% extends "auth/authbase.html" %}

{% block content %}

<div class="flex items-center justify-center py-6">
    <div class="w-full max-w-lg">

        <h1 class="text-xl font-semibold mb-6 text-center">
            {{ data }}
        </h1>

        <form method="post" class="space-y-4">
            <input name="username"
                   placeholder="Username..."
                   class="w-full px-4 py-3 rounded-xl bg-gray-100">

            <input name="password"
                   placeholder="Password..."
                   class="w-full px-4 py-3 rounded-xl bg-gray-100">

            <button class="px-5 py-2 rounded-xl bg-black text-white hover:opacity-90 w-full">
                {{ data }}
            </button>
        </form>

        <!-- Back link -->
        <div class="mt-4 text-center">
            <a href="{{ url_for('auth.home') }}"
               class="text-sm text-stone-600 hover:text-stone-900 underline">
                ← Go back to home
            </a>
        </div>

    </div>
</div>

{% endblock %}
