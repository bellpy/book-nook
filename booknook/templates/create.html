{% extends "base.html" %}

{% block content %}

<div class="flex items-center justify-center py-6">
    <div class="w-full max-w-lg">
        <h1 class="text-xl font-semibold mb-6 text-center">Add a Book</h1>

        <form method="post" class="space-y-4">
            <input name="title"
                placeholder="Book title"
                class="w-full px-4 py-3 rounded-xl bg-gray-100">

            <input name="author"
                placeholder="Author"
                class="w-full px-4 py-3 rounded-xl bg-gray-100">
            
            <input name="genres"
                placeholder="Genres (comma separated e.g. Fantasy, Sci-Fi)"
                class="w-full px-4 py-3 rounded-xl bg-gray-100">

            <textarea name="review"
                placeholder="Your thoughts..."
                class="w-full px-4 py-3 rounded-xl bg-gray-100"></textarea>

            <select name="rating" class="w-full px-4 py-3 rounded-xl bg-gray-100">
                <option value="">Rating</option>
                <option value="1">★</option>
                <option value="2">★★</option>
                <option value="3">★★★</option>
                <option value="4">★★★★</option>
                <option value="5">★★★★★</option>
            </select>

            <button class="px-5 py-2 rounded-xl bg-black text-white hover:opacity-90 w-full">
                Save
            </button>
        </form>
    </div>
</div>

{% endblock %}
