{% extends "base.html" %}

{% block content %}

<!-- Search bar -->
<div class="mb-6">
    <input 
        type="text"
        placeholder="Search for books..."
        class="w-full px-4 py-3 rounded-xl bg-gray-100 focus:outline-none"
    >
</div>

<!-- Section header -->
<div class="flex justify-between items-center mb-4">
    <h2 class="text-lg font-semibold">Your Books</h2>
    <a href="#" class="text-sm text-gray-500">View all</a>
</div>

<!-- Horizontal scroll -->
<div class="flex gap-4 overflow-x-auto pb-2">

    {% for book in books %}
    <div class="min-w-[140px]">

        <!-- Book card -->
        <div class="bg-[#f6f1eb] rounded-xl p-3 shadow-sm hover:shadow-md transition">

            <!-- Cover -->
            <div class="h-40 bg-[#e8ddd2] rounded-lg mb-3 flex items-center justify-center text-xs text-gray-500">
                Cover
            </div>

            <!-- Title -->
            <p class="text-sm font-medium leading-tight">
                {{ book.title }}
            </p>

            <!-- Author -->
            <p class="text-xs text-gray-500">
                {{ book.author }}
            </p>

        </div>
    </div>
    {% endfor %}

</div>

<!-- Stats and quick add-->
<div class="mt-10 grid md:grid-cols-2 gap-6">

    <div class="bg-[#f6f1eb] rounded-xl p-6 flex items-center gap-4">
        <div class="text-4xl">⭐</div>
        <div>
            <h3 class="font-semibold">Your Reading Stats</h3>
            <p class="text-sm text-gray-500">
                {{ books|length }} books tracked
            </p>
        </div>
    </div>

    <div class="bg-[#f6f1eb] rounded-xl p-6">
        <h3 class="font-semibold mb-2">Quick Add</h3>
        <a href="/create" class="text-sm text-blue-600">
            + Add a new book
        </a>
    </div>

</div>

{% endblock %}
